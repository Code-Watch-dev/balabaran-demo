<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>خطا | بالابران — صفحه مورد نظر پیدا نشد</title>
    <meta name="description" content="صفحه مورد نظر شما در وبسایت بالابران یافت نشد. لطفاً به صفحه اصلی بازگردید یا با پشتیبانی تماس بگیرید." />
    <meta name="robots" content="noindex, follow" />

    <link rel="icon" type="image/svg+xml" href="favicon_io/favicone.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png" />
    <link rel="manifest" href="favicon_io/site.webmanifest" />
    <meta name="theme-color" content="#f25c05" />
    <meta name="msapplication-TileColor" content="#f25c05" />

    <link rel="stylesheet" href="assets/css/root.css" />
    <link rel="stylesheet" href="assets/css/font.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/components/error.css" />
    <link rel="stylesheet" href="assets/css/components/footer.css" />
    </head>
  <body>
<section class="error-section">
      <div class="container">
        <!-- تصویر آسانسور -->
        <div class="image-box">
          <img id="errorImage" src="assets/images/error/404.webp" alt="404" width="600" height="400" />
        </div>

        <!-- محتوا -->
        <div class="content-box">
          <h1 id="errorTitle">صفحه مورد نظر پیدا نشد!</h1>

          <p class="description" id="errorDescription">
            به نظر می‌رسد آسانسور صفحه‌ای که به دنبالش هستید در طبقه 404 متوقف
            شده است.
          </p>

          <!-- نمایشگر -->
          <div class="elevator-display">
            <div class="arrow up">↑</div>

            <div class="number">
              <img
                id="errorDisplayImage"
                src="assets/images/error/n_404.webp"
                alt="404"
                width="140" height="70"
                style="max-height: 70px; display: block"
              />
            </div>

            <div class="arrow down">↓</div>
          </div>

          <!-- دکمه ها -->
          <div class="buttons">
            <a href="/" class="btn btn-primary"> بازگشت به صفحه اصلی </a>

            <a href="portfolio.html" class="btn btn-secondary"> مشاهده نمونه‌کارها </a>
          </div>

          <!-- باکس پشتیبانی -->
          <div class="support-box">
            <div class="support-icon">🎧</div>

            <div class="support-content">
              <h3>به کمک نیاز دارید؟</h3>

              <p>تیم پشتیبانی ما آماده پاسخگویی به سوالات شماست.</p>

              <a href="contact.html"> تماس با ما ← </a>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="assets/js/error.js" defer></script>
    <div id="footer-placeholder"></div>
    <script src="assets/js/partials.js" defer></script>
  </body>
</html>
